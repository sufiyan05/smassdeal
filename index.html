<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SMASSDEAL Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page d-flex align-items-center justify-content-center p-3 p-lg-4" data-page="login">
    <div class="login-shell">
        <div class="row g-0">
            <div class="col-lg-6 login-brand-panel d-flex align-items-center">
                <div class="p-4 p-md-5 p-xl-6 w-100 brand-panel-inner">
                    <div class="brand-frame text-center">
                        <img src="assets/logo.png" alt="SMASSDEAL Logo" class="img-fluid login-brand-logo">
                    </div>
                </div>
            </div>

            <div class="col-lg-6 login-form-panel d-flex align-items-center">
                <div class="p-4 p-md-5 p-xl-6 w-100 d-flex justify-content-center">
                    <div class="login-form-wrap">
                        <div class="mb-4">
                            <h2 class="h1 fw-bold mb-2">Welcome Back</h2>
                            <p class="text-secondary mb-0">Sign in to continue to the SMASSDEAL Admin Panel.</p>
                        </div>

                        <div id="loginAlert"></div>

                        <form id="loginForm" class="row g-3">
                            <div class="col-12">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <input type="email" class="form-control form-control-lg rounded-4" id="email" name="email" placeholder="" required autofocus>
                            </div>

                            <div class="col-12">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group input-group-lg">
                                    <input type="password" class="form-control password-input rounded-start-4" id="password" name="password" placeholder="" required>
                                    <button class="btn password-toggle rounded-end-4" type="button" id="togglePassword" aria-label="Show password">
                                        <i class="bi bi-eye" id="togglePasswordIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="col-12 d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="1" id="remember" name="remember">
                                    <label class="form-check-label" for="remember">Remember me</label>
                                </div>
                                <!-- <span class="small text-secondary">Frontend auth placeholder</span> -->
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-dark btn-lg w-100 rounded-4">Login</button>
                            </div>
                        </form>

                        <!-- <div class="demo-credentials mt-4">
                            <div class="section-label mb-2">Firebase Authentication</div>
                            <p class="small text-secondary mb-1">Use your Firebase Auth credentials to login.</p>
                            <p class="small text-secondary mb-0">Make sure Firebase Authentication is enabled in your Firebase console.</p>
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, query, orderBy, where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
        window.firebase = { initializeApp, getAuth, getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, query, orderBy, where, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence };
    </script>
    <script src="js/firebase.js" defer></script>
    <script src="js/users.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/orders.js" defer></script>
    <script src="js/investments.js" defer></script>
    <script src="js/ui.js" defer></script>
</body>
</html>
